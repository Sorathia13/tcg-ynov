# Base de données PostgreSQL du projet (stack documentée : PostgreSQL + Prisma).
# Lancement : docker compose up -d
# La chaîne de connexion correspondante est dans server/.env.example
services:
  db:
    image: postgres:16-alpine
    container_name: tcg-ynov-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tcg
      POSTGRES_PASSWORD: tcg
      POSTGRES_DB: tcg
    ports:
      - "5432:5432"
    volumes:
      - tcg_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tcg -d tcg"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  tcg_pgdata:
